version: "1"

services:
  # ------------------------------------------------------------------
  # Frontend Static Site (React)
  # ------------------------------------------------------------------
  - type: web
    name: e-wallet-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: "e-wallet-backend-m2ch.onrender.com"
    
  # ------------------------------------------------------------------
  # Backend Web Service (Spring Boot)
  # ------------------------------------------------------------------
  - type: web
    name: e-wallet-backend
    env: docker
    plan: free
    rootDir: backend
    envVars:
      - key: JWT_SECRET
        generateValue: true
      # Hooking up the Postgres DB automatically generated below
      - key: DB_HOST
        fromDatabase:
          name: e-wallet-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: e-wallet-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: e-wallet-postgres
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: e-wallet-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: e-wallet-postgres
          property: password
      # Redis configuration (Render does NOT have a free Redis tier anymore)
      # You MUST replace these placeholder values inside the Render Dashboard 
      # with credentials from a free Upstash (upstash.com) Redis database.
      - key: SPRING_DATA_REDIS_HOST
        sync: false
      # Prevent committing the database password to GitHub!
      # We use 'sync: false' so Render asks you for the secret during deployment.
      - key: SPRING_DATA_REDIS_PASSWORD
        sync: false
      - key: SPRING_DATA_REDIS_PORT
        sync: false
      # Upstash requires TLS for secure connections!
      - key: SPRING_DATA_REDIS_SSL_ENABLED
        value: "true"

databases:
  # ------------------------------------------------------------------
  # Database (Render Free PostgreSQL)
  # Expires after 90 days on Free Tier
  # ------------------------------------------------------------------
  - name: e-wallet-postgres
    databaseName: ewallet_db
    plan: free
