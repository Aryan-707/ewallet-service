spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false # H2 schema managed by Hibernate in tests
  data:
    redis:
      host: localhost
      port: 6379

app:
  security:
    jwtSecret: testSecretKeyThatIsAtLeastThirtyTwoBytesLongForHmacSha
    jwtExpirationMs: 3600000

logging:
  level:
    root: warn
